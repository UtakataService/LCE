name: Bug report
description: Report a reproducible defect in an experimental LCE contract.
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: environment
    attributes:
      label: Environment and version
      description: Include Python version, LCE version, and Pack/Profile hashes.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include a minimal command, fixture, trace, or code sample.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: I checked CURRENT_STATUS.md and this report stays within the documented capability boundary.
          required: true
