name: LCE bounded contracts

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install pytest
      - run: python scripts/verify_public_tree.py
      - run: python scripts/verify_holdout_manifest.py
      - run: python scripts/verify_release_candidate.py
      - run: PYTHONPATH=. python -m pytest -q
      - run: PYTHONPATH=. python -m lce_validation.cli run-public-readiness-evidence --out public-readiness-evidence
      - uses: actions/upload-artifact@v4
        with:
          name: public-readiness-evidence
          path: public-readiness-evidence
